name: Install Matrix

# Tests install.sh against a fresh host per target OS so the one-line
# install story can't silently break between releases. Runs on:
#   - PRs that touch install.sh, Dockerfile, or workflow files
#   - A nightly cron so we catch upstream breakage (Docker repo key rotation,
#     Node tarball CDN changes, apt repo availability) without a blocking PR
on:
  pull_request:
    paths:
      - "install.sh"
      - "install.ps1"
      - "Dockerfile"
      - ".github/workflows/install-test.yml"
  schedule:
    # 03:00 UTC daily — off-peak for GitHub runners.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  linux:
    name: install.sh (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            install-prereqs: |
              apt-get update
              apt-get install -y curl ca-certificates sudo openssl git
          - image: ubuntu:24.04
            install-prereqs: |
              apt-get update
              apt-get install -y curl ca-certificates sudo openssl git
          - image: debian:12
            install-prereqs: |
              apt-get update
              apt-get install -y curl ca-certificates sudo openssl git procps
          - image: fedora:40
            install-prereqs: |
              dnf install -y curl ca-certificates sudo openssl git procps-ng which
    container:
      image: ${{ matrix.image }}
      options: --privileged
      # Privileged is required because install.sh may install Docker via
      # get.docker.com, which needs to write to /etc/docker and friends.

    steps:
      - name: Install prerequisites
        shell: bash
        run: |
          set -euxo pipefail
          ${{ matrix.install-prereqs }}
          # Create a non-root user so install.sh doesn't bail on "no SUDO_USER".
          useradd -m -s /bin/bash talome-ci || true
          echo "talome-ci ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/talome-ci

      - uses: actions/checkout@v4

      - name: Smoke-test install.sh syntax
        shell: bash
        run: |
          set -euxo pipefail
          # Bash syntax check — catches typos even when the installer
          # short-circuits before running the interactive flow.
          bash -n install.sh

      - name: Exercise update path (proves no regressions)
        shell: bash
        run: |
          set -euxo pipefail
          # Full `curl | bash` is heavy (Docker + Node + build). For CI we
          # run `install.sh update` with no existing install — it should
          # fail fast via `fatal`, which proves:
          #   - the script parses and loads
          #   - argv dispatch works
          #   - the "Talome not found" early-exit path is reachable
          #
          # The uninstall path uses `ask REPLY </dev/tty` which doesn't
          # work in a container without a tty; we rely on shellcheck +
          # `bash -n` (run above) to catch syntax errors there.
          if bash install.sh update 2>&1; then
            echo "ERROR: install.sh update should fail with no existing install"
            exit 1
          else
            echo "install.sh update correctly rejects missing install"
          fi

  powershell-syntax:
    name: install.ps1 syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse install.ps1
        shell: pwsh
        run: |
          # Use the PowerShell tokenizer to catch syntax errors without
          # actually running the installer (which only tells Windows users
          # to use WSL2, but we still want to catch typos).
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/install.ps1", [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "install.ps1 parses cleanly."
