name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI Assistant / Chat
        - Dashboard UI
        - App Store
        - Docker / Containers
        - Media (Sonarr, Radarr, Jellyfin)
        - System Monitoring
        - Automations
        - Installer
        - Documentation
        - Other
    validations:
      required: true
