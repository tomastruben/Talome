services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - ./config:/config
      - ./movies:/movies
      - ./downloads:/downloads
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
