services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - ./config:/config
      - ./tv:/tv
      - ./downloads:/downloads
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
